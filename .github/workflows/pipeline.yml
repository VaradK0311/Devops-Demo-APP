name: DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Python
      run: sudo apt update && sudo apt install python3-pip -y

    - name: Install Dependencies
      run: pip3 install -r requirements.txt

    - name: Run App
      run: python3 app.py
